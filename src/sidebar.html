<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sisyphus Stack</title>
    <script type="module" src="./sidebar.ts"></script>
  </head>
  <body>
    <main class="sidebar">
      <header class="side-head">
        <div>
          <p class="cipher">Sisyphus // log</p>
          <h1>Stack</h1>
        </div>
        <button id="refresh" class="ghost">Sync</button>
      </header>

      <section id="learning" class="learning">
        <div class="learning-head">
          <span class="cipher bright">Calibrating</span>
          <span id="learningPct" class="cipher bright">0%</span>
        </div>
        <div class="bar"><div class="fill" id="fill"></div></div>
        <span id="learningText" class="cipher">0 / 150 events</span>
      </section>

      <section id="actions" class="action-stack"></section>

      <section id="empty" class="empty">
        <div class="cipher-field" id="emptyField" aria-hidden="true"></div>
        <div class="empty-copy">
          <span class="cipher bright">No actions logged</span>
          <span>Reversible tab changes will appear here.</span>
        </div>
      </section>
    </main>
  </body>
</html>
