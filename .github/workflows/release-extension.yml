name: Build extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package extension
        run: npm run package:zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sisyphus-extension
          path: sisyphus-extension.zip
          if-no-files-found: error

      - name: Publish latest stable zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

          notes="Automated stable build from main at ${GITHUB_SHA}."
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest sisyphus-extension.zip --clobber
            gh release edit latest \
              --title "Latest Sisyphus Extension Build" \
              --notes "$notes" \
              --latest
          else
            gh release create latest sisyphus-extension.zip \
              --title "Latest Sisyphus Extension Build" \
              --notes "$notes" \
              --latest
          fi
